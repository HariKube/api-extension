name: Release

on:
  push:
    branches:
    - release-v**
    - rc-v**
    - beta-v**
    - alpha-v**
    - dev-v**

concurrency: 
  group: ${{ github.ref_name }}-release
  cancel-in-progress: true

permissions:
  contents: write

env:
  GITHUB_TOKEN: ${{ secrets.GIT_TOKEN  }}
  
jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: Clone the code
      uses: actions/checkout@v4
      with:
          fetch-depth: 0
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
          go-version-file: go.mod
    - name: Extract branch name
      run: echo "branch=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> $GITHUB_OUTPUT
      id: extract_branch
    - name: Login to registry
      uses: docker/login-action@v3
      with:
        registry: ${{ vars.REGISTRY }}
        username: ${{ vars.REGISTRY_USER }}
        password: ${{ secrets.REGISTRY_TOKEN }}
    - name: Build image
      run: make docker-build
      env:
        IMG: ${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/api-extension:${{ steps.extract_branch.outputs.branch }}
    - name: Push image
      run: make docker-push
      env:
        IMG: ${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/api-extension:${{ steps.extract_branch.outputs.branch }}
    - name: Generate bundle
      run: make package
      env:
        IMG: ${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/api-extension:${{ steps.extract_branch.outputs.branch }}
        TAG: ${{ steps.extract_branch.outputs.branch }}
    - name: Create release
      if: ${{ !startsWith(github.ref, 'refs/heads/dev-') }}
      uses: mhmxs/milestone-release-action@main
      with:
        milestone-title: ${{ steps.extract_branch.outputs.branch }}
        pre-body: |
            # api-extension
            This repository contains a Kubernetes API extension to implement advanced data management.

            ## Installation
            ```
            kubectl create namespace api-extension-system
            kubectl apply -f https://github.com/HariKube/api-extension/releases/download/${{ steps.extract_branch.outputs.branch }}/bundle-config-${{ steps.extract_branch.outputs.branch }}.yaml
            kubectl apply -f https://github.com/HariKube/api-extension/releases/download/${{ steps.extract_branch.outputs.branch }}/bundle-${{ steps.extract_branch.outputs.branch }}.yaml
            ```

            ## Release Notes
        draft: true
        prerelease: ${{ startsWith(github.ref, 'refs/heads/rc-') || startsWith(github.ref, 'refs/heads/beta-') || startsWith(github.ref, 'refs/heads/alpha-') }}
        files: package/bundle-${{ steps.extract_branch.outputs.branch }}.yaml,package/bundle-config-${{ steps.extract_branch.outputs.branch }}.yaml
  